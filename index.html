        .lv-하 { background: #b7e4c7; } .lv-중 { background: #ade8f4; } .lv-상 { background: #fca311; }

        .btn:disabled { opacity: 0.6; cursor: wait; }

        #heart-container { position: absolute; top: 65px; left: 25px; display: flex; gap: 4px; }
        .heart { font-size: 18px; text-shadow: 0 0 5px #fff; }

    let cello, lives = 10, score = 0, speed = 3.2, accel = 0.00008, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, laneGlow = [0, 0, 0, 0];

    function getLaneFromNote(note) {
        const notes = ["C1","D1","E1","F1","G1","A1","B1","C2","D2","E2","F2","G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5"];
        let idx = notes.indexOf(note);
        if (idx === -1) idx = 12;
        let lane = Math.floor((idx / notes.length) * 4);
        if (lane === prevLane) lane = (lane + 1) % 4;
        prevLane = lane;
        return Math.max(0, Math.min(3, lane));
    }

    const compressor = new Tone.Compressor({ threshold: -32, ratio: 4.2 }).connect(eq);
    const filter = new Tone.Filter(3200, "lowpass").connect(compressor);
    const vibrato = new Tone.Vibrato({ frequency: 4.8, depth: 0.01 }).connect(filter); 

    cello = new Tone.Sampler({
        urls: { 
            "C2": "C2.mp3", "D2": "D2.mp3", "E2": "E2.mp3", "F2": "F2.mp3", "G2": "G2.mp3", "A2": "A2.mp3", "B2": "B2.mp3",
            "C3": "C3.mp3", "D3": "D3.mp3", "E3": "E3.mp3", "F3": "F3.mp3", "G3": "G3.mp3", "A3": "A3.mp3", "B3": "B3.mp3",
            "C4": "C4.mp3", "D4": "D4.mp3", "E4": "E4.mp3", "G4": "G4.mp3"
        },
        attack: 0.22,  // 🎻 타격음 억제: 활을 현에 대는 준비 과정 시뮬레이션
        release: 1.3, 
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/MusyngKite/cello-mp3/",
        onload: () => { 
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "리얼 보잉 공연 입장 ✨"; 
        }
    }).connect(vibrato);
    
    cello.maxPolyphony = 2; // 🎻 오르간식 화음 방지: 독주 느낌 강화

    setTimeout(() => {
        const btn = document.getElementById('start-btn');
        if(btn.disabled) { btn.disabled = false; btn.innerText = "조율 완료! 무대 입장 ✨"; }
    }, 4000);

    function spawnTile(yOffset = 0) {
        const songNotes = songs[selected].p.split(',');
        if (nextNoteIndex >= songNotes.length) return;
        const note = songNotes[nextNoteIndex];
        const lane = getLaneFromNote(note);
        const y = yOffset - (canvas.height / 4);
        tiles.push({ lane: lane, y: y, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function updateHearts() {
        const container = document.getElementById('heart-container');
        container.innerHTML = "🩷".repeat(lives);
    }

    function showWarning() {
        const el = document.getElementById('warning-text');
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 500);
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bpm = songs[selected].bpm;
        const pulsePeriod = (60 / bpm) * 1000;
        pulseOpacity = Math.max(0, 1 - ((Date.now() % pulsePeriod) / (pulsePeriod / 2)));
        ctx.fillStyle = `rgba(197, 160, 89, ${pulseOpacity * 0.3})`;
        ctx.fillRect(0, canvas.height * 0.8, canvas.width, 10);

        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(197, 160, 89, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad; ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;
            if(t.hit) {
                ctx.fillStyle = "rgba(197, 160, 89, 0.25)"; ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "#333"; 
                drawRoundedRect(ctx, x + 8, t.y + 8, canvas.width/4 - 16, t.h - 16, 20);
            }

            if(t.y > canvas.height) {
                if(!t.hit) { 
                    lives--; updateHearts(); showWarning(); 
                    if(lives <= 0) endConcert(false); 
                }
                tiles.splice(i, 1);
                const lastY = tiles.length > 0 ? tiles[tiles.length-1].y : 0;
                spawnTile(lastY);
            }
        }

        let elapsed = (Date.now() - startTime) / 1000;
        let progress = (elapsed / songs[selected].time) * 100;
        document.getElementById('progress-bar').style.width = Math.min(100, progress) + "%";
        if(progress >= 100 && (tiles.length === 0 || tiles.every(t => t.hit || t.y > canvas.height))) endConcert(true);

        speed += accel;
        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const lane = Math.floor(tx / (canvas.width / 4));
        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.15); 
        
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0;
            
            // 🎻 [V96 핵심] 인간적인 비브라토 & 0.15초 오버랩 레가토
            vibrato.depth = 0.008 + Math.random() * 0.01; 
            vibrato.frequency = 4.5 + Math.random() * 1.5; 

            if (lastNote && lastNote !== target.note) {
                cello.triggerRelease(lastNote, "+0.15"); // 🎻 활을 떼지 않는 연결감
            }
            cello.triggerAttack(target.note, Tone.now(), 0.9);
            lastNote = target.note;
        }
    });

    function endConcert(win) {
        isPlaying = false;
        if (lastNote) cello.triggerRelease(lastNote);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><span class="lv-badge lv-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start();
        isPlaying = true; tiles = []; score = 0; lives = 10; nextNoteIndex = 0; startTime = Date.now(); lastNote = null;
        updateHearts();
        const lv = songs[selected].lv;
        if(lv === "하") { speed = 2.8; accel = 0.00002; }
        else if(lv === "중") { speed = 3.8; accel = 0.00007; }
        else { speed = 5.0; accel = 0.00015; }
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
