<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cello Maestro V82 - Hauser Deep Sound</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --gold: #c5a059; --pink: #ff85c0; --pearl: #ffffff; --soft-pink: #ffeef4; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        canvas { 
            background: linear-gradient(135deg, #ffffff 0%, #fffafa 50%, #fff9e6 100%); 
            width: 100%; height: 100%; max-width: 500px;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.2);
            touch-action: none;
        }

        .ui-layer { position: absolute; top: 0; left: 50%; width: 100%; height: 100%; max-width: 500px; transform: translateX(-50%); pointer-events: none; z-index: 10; }
        #lobby, #result { pointer-events: auto; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 35px; color: #333; height: 100%; width: 100%; justify-content: center; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        
        h1 { text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 2px rgba(0,0,0,0.05); margin-bottom: 25px; }
        #song-list { flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.6); border-radius: 25px; padding: 10px; margin-bottom: 20px; border: 1px solid var(--soft-pink); }
        .song-item { padding: 16px; border-radius: 15px; margin-bottom: 10px; background: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .song-item.active { background: #fffdf5; border-color: var(--gold); color: var(--gold); font-weight: 900; }
        
        .lv-badge { font-size: 10px; padding: 4px 10px; border-radius: 12px; color: #fff; font-weight: 900; }
        .lv-하 { background: #b7e4c7; } .lv-중 { background: #ade8f4; } .lv-상 { background: #fca311; }

        .btn { width: 100%; padding: 22px; border-radius: 60px; border: none; font-size: 20px; font-weight: 900; background: var(--gold); color: #fff; cursor: pointer; pointer-events: auto; box-shadow: 0 8px 25px rgba(197, 160, 89, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        
        #game-ui { display: none; height: 100%; width: 100%; position: relative; }
        #heart-container { position: absolute; top: 65px; left: 20px; display: flex; gap: 3px; }
        .heart { font-size: 16px; }
        #score-display { text-align: center; font-size: 60px; font-weight: 900; color: var(--gold); padding-top: 85px; }
        #progress-bar { width: 0%; height: 8px; background: var(--gold); box-shadow: 0 0 10px var(--gold); position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="lobby">
        <h1>🎻 Ultimate Cello Archive ✨</h1>
        <div id="song-list"></div>
        <button id="start-btn" class="btn" disabled>깊은 첼로의 소리를 찾는 중...</button>
    </div>

    <div id="game-ui">
        <div id="progress-bar"></div>
        <div id="heart-container"></div>
        <div id="score-display">0</div>
    </div>

    <div id="result" style="display:none; text-align:center;">
        <h1 style="font-size: 28px; color: var(--gold);">Authentic Bravo! ✨</h1>
        <div id="final-score" style="font-size: 80px; font-weight: 900; margin: 25px 0; color: var(--gold);">0</div>
        <button id="retry-btn" class="btn">다시 무대로 입장</button>
    </div>
</div>

<script>
    // 🎻 20곡 원곡 악보 데이터 (3분 이상 풀 시퀀스)
    const songs = [
        { t: "Bach: Cello Suite No.1 Prelude", lv: "중", p: "G2,D3,B3,A3,B3,D3,G2,D3,B3,A3,B3,D3,C3,E3,C4,B3,C4,E3,C3,E3,C4,B3,C4,E3,C3,F#3,C4,B3,C4,F#3,C3,F#3,C4,B3,C4,F#3,B2,G3,B3,A3,B3,G3,B2,G3,B3,A3,B3,G3,A2,A3,C4,B3,C4,A3,A2,A3,C4,B3,C4,A3,D2,A3,C4,B3,C4,A3,D2,A3,C4,B3,C4,A3,G2,D3,B3,A3,B3,D3,G2,D3,B3,A3,B3,D3,E3,B3,G4,F#4,G4,B3,E3,B3,G4,F#4,G4,B3,C#3,A#3,E4,D#4,E4,A#3,C#3,A#3,E4,D#4,E4,A#3,D3,B3,F#4,E4,F#4,B3,D3,B3,F#4,E4,F#4,B3,G2,D3,B3,A3,B3,D3", time: 180 },
        { t: "Vivaldi: Concerto for 3 Violins", lv: "상", p: "F4,A4,C5,F5,A5,C6,A5,F5,C5,A4,F4,C5,F5,A5,C6,A5,F5,C5,A4,F4,C5,F5,F5,G5,A5,Bb5,C6,Bb5,A5,G5,F5,E5,D5,C5,Bb4,A4,G4,F4,C5,F5,A5,C6,D6,C6,Bb5,A5,G5,F5,E5,D5,C5,Bb4,A4,G4,F4,G4,A4,Bb4,C5,D5,E5,F5,G5,A5,B5,C6,D6,E6,F6,G6,A6,G6,F6,E6,D6,C6,Bb5,A5,G5,F5,E5,D5,C5,Bb4,A4,G4,F4,C5,F5,A5,C6,F6,A6,C7,A6,F6,C6,A5,F5,C5,A4,F4,C5,F5,A5,C6", time: 190 },
        { t: "Saint-Saëns: The Swan", lv: "하", p: "G2,B2,D3,G3,F#3,E3,D3,B2,A2,G2,A2,B2,D3,A2,G2,G2,B2,D3,G3,F#3,G3,A3,B3,A3,G3,E3,D3,B2,G2,B2,D3,G3,B3,A3,G3,F#3,E3,D3,C3,B2,A2,G2,A2,B2,D3,A2,G2,C3,E3,G3,C4,B3,A3,G3,F3,E3,D3,C3,D3,E3,G3,D3,C3", time: 160 },
        { t: "Elgar: Cello Concerto (1st Mov)", lv: "상", p: "E2,B2,E3,F#3,G3,E2,B2,E3,F#3,G3,A3,B3,C4,B3,A3,G3,F#3,E3,D#3,E3,F#3,G3,A3,B3,E4,D#4,E4,B3,G3,E3,B2,E2,B2,E3,F#3,G3,A3,B3,C4,D4,E4,D4,C4,B3,A3,G3,F#3,E3,F#3,G3,A3,B3,C4,A3,F#3,D3,B2,G2,E2", time: 200 },
        { t: "Dinicu: Hora Staccato", lv: "상", p: "A3,A3,A3,A3,G3,F3,E3,D3,C3,B2,A2,G2,F2,E2,D2,C2,D2,E2,F2,G2,A2,B2,C3,D3,E3,F3,G3,A3,B3,C4,D4,E4,F4,G4,A4,G4,F4,E4,D4,C4,B3,A3,G3,F3,E3,D3,C3,B2,A2,B2,C3,D3,E3,F3,G3,A3,B3,C4", time: 150 },
        { t: "Saint-Saëns: Danse Macabre", lv: "상", p: "D3,D4,A3,Ab3,D3,D4,A3,Ab3,D3,D4,A3,Ab3,G3,F3,E3,D3,C#3,D3,E3,A2,A3,G3,F3,E3,D3,C#3,D3,B2,A2,D3,D4,A3,Ab3,D3,D4,A3,Ab3,D3,D4,A3,Ab3,G3,F3,E3,D3,C#3,D3,E3,A3,Bb3,A3,G3,F3,E3,D3,C#3,D3,E3,F3,G3,A3,Bb3,C4,D4,E4,F4,G4,A4,Bb4,A4,G4,F4,E4,D4,C#4,D4,E4,D4,A3,F3,D3", time: 175 },
        { t: "Bach: Cello Suite No.1 Gigue", lv: "중", p: "G3,D3,G2,B2,D3,G3,B3,D4,G4,D4,B3,G3,D3,B2,G2,D3,G3,B3,A3,G3,F#3,E3,D3,C3,B2,A2,G2,A2,B2,C3,D3,E3,F#3,G3,A3,B3,C4,B3,A3,G3,F#3,G3,A3,B3,C4,D4,E4,D4,C4,B3,A3,G3,F#3,E3,D3,C3,B2,A2,G2", time: 170 },
        { t: "Rachmaninoff: Vocalise", lv: "하", p: "C#3,D3,C#3,B2,A2,B2,C#3,E3,A3,G#3,F#3,E3,D3,C#3,B2,A2,G#2,A2,B2,C#3,D3,E3,F#3,G#3,A3,B3,C#4,B3,A3,G#3,F#3,E3,D3,C#3,D3,E3,F#3,D3,B2,A2,G#2,A2,B2,C#3,A2", time: 180 },
        { t: "Pachelbel: Canon in D", lv: "중", p: "F#4,E4,D4,C#4,B3,A3,B3,C#4,D4,F#4,A4,G4,F#4,D4,F#4,E4,D4,C#4,B3,A3,B3,C#4,D4,D3,E3,F#3,G3,A3,B3,C#4,D4,E4,F#4,G4,A4,B4,A4,G4,F#4,G4,A4,D4,F#4,A4,B4,G4,A4,F#4,D4", time: 165 },
        { t: "Mozart: Turkish March", lv: "상", p: "B3,A3,G#3,A3,C4,D4,C4,B3,C4,E4,F4,E4,D#4,E4,G4,A4,G4,F4,G4,C5,B4,A4,G#4,A4,C5,A4,G4,F#4,G4,B4,G4,F4,E4,D4,E4,C4", time: 140 },
        { t: "Vivaldi: Winter (RV 297)", lv: "상", p: "F3,F3,F3,F3,F3,F3,F3,F3,Ab3,G3,F3,E3,C3,F3,F3,F3,F3,F3,F3,F3,F3,Ab3,G3,F3,E3,C3,C4,C4,C4,C4,Db4,C4,Bb3,Ab3,G3,F3,E3,C3,F3,Ab3,C4,F4,F3,Ab3,C4,F4,F3,Ab3,C4,F4", time: 155 },
        { t: "Brahms: Hungarian Dance No.5", lv: "상", p: "A2,D3,F3,A3,G3,F3,E3,D3,A2,D3,F3,A3,G3,F3,E3,D3,C#3,E3,G3,Bb3,A3,G3,F3,E3,D3,A2,D3,F3,A3,D4,C4,Bb3,A3,G3,F3,E3,D3,A3,Bb3,A3,G3,F3,E3,D3,C#3,D3,E3,A2,D3,F3,A3,D4", time: 135 },
        { t: "Beethoven: Cello Sonata No.3", lv: "상", p: "A2,E3,A3,C4,B3,A3,G#3,A3,B3,E2,A2,E3,A3,C4,B3,A3,G#3,A3,B3,C4,D4,E4,D4,C4,B3,A3,G#3,F#3,E3,D3,C3,B2,A2,E3,A3,B3,C4,D4,E4,F4,E4,D4,C4,B3,A3,E3,A2,E2,A2", time: 185 },
        { t: "Schubert: Ave Maria", lv: "하", p: "Bb3,Bb3,D4,F4,Bb4,A4,G4,F4,Eb4,D4,C4,Bb3,A3,Bb3,C4,F3,Bb3,D4,F4,Bb4,D5,C5,Bb4,A4,G4,F4,G4,A4,Bb4,F4,Bb4,D5,F5,Eb5,D5,C5,Bb4,A4,Bb4,C5,F4,D5,Bb4,G4,F4,Eb4,D4,C4,Bb3", time: 145 },
        { t: "Elgar: Salut d'Amour", lv: "중", p: "E3,F#3,G3,A3,B3,C4,D4,B3,G3,E3,C3,A2,F#2,D2,E3,F#3,G3,A3,B3,C4,D4,B3,G3,E3,C3,D3,E3,F3,G3,A3,B3,C4,D4,E4,F4,G4,A4,B4,C5,Bb4,A4,G4,F4,E4,D4,C4,B3,A3,G3,F3,E3,D3,C3,B2,A2,G2", time: 140 },
        { t: "Tchaikovsky: Swan Lake", lv: "중", p: "F#3,B3,C#4,D4,E4,D4,C#4,B3,F#3,B3,C#4,D4,F4,E4,D4,C#4,B3,A3,B3,C#4,D4,E4,F#4,G4,A4,G4,F#4,E4,D4,C#4,B3,A3,G3,A3,B3,C#4,D4,E4,F#4,G4,F#4,E4,D4,C#4,B3,A3,G3,F#3,E3,D3,C3,B2", time: 130 },
        { t: "Handel: Ombra mai fù", lv: "하", p: "F3,G3,A3,Bb3,A3,G3,F3,E3,D3,C3,D3,E3,F3,G3,A3,Bb3,C4,A3,G3,F3,E3,F3,G3,C3,F3,G3,A3,Bb3,A3,G3,F3,E3,F3,G3,F3,E3,D3,C3,F3,G3,A3,Bb3,A3,G3,F3", time: 150 },
        { t: "Bizet: Carmen Habanera", lv: "상", p: "D3,D3,C3,B2,A2,G#2,A2,B2,C3,D3,E3,F3,G3,A3,B3,C4,D4,E4,F4,G4,A4,F4,D4,B3,G3,E3,C3,B2,A2,G2,A2,B2,C3,D3,E3,F3,G3,A3,B3,C4,D4,E4,F4,G4,A4,B4,C5,D5,E5,F5,G5,A5,G5,F5,E5,D5,C5", time: 145 },
        { t: "Bach: Air on G String", lv: "하", p: "F#4,F#3,E4,E3,D4,D3,C#4,C#3,B3,A3,G3,F#3,E3,D3,C#3,B2,A2,G2,F#2,E2,D2,E2,F#2,G2,A2,B2,C#3,D3,E3,F#3,G3,A3,B3,C#4,D4,E4,F#4,G4,A4,B4,C#5,D5,E5,F#5,G5,A5,B5,C6", time: 155 },
        { t: "Massenet: Méditation de Thaïs", lv: "하", p: "D3,F#3,A3,D4,F#4,E4,D4,C#4,B3,A3,B3,C#4,D4,F#3,G3,A3,D3,F#3,A3,D4,F#4,A4,G4,F#4,E4,D4,C#4,D4,E4,A3,D4,F#4,A4,D5,C#5,B4,A4,G4,F#4,E4,D4,F#4,E4,D4", time: 180 }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let cello, lives = 10, score = 0, speed = 3.2, accel = 0.00008, isPlaying = false, selected = 0;
    let tiles = [], nextNoteIndex = 0, startTime, particles = [], laneGlow = [0, 0, 0, 0];
    let prevLane = -1, currentNote = null;

    function getLaneFromNote(note) {
        const notes = ["G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5","G5","A5","B5","C6"];
        let idx = notes.indexOf(note);
        if (idx === -1) idx = 10;
        let lane = Math.floor((idx / notes.length) * 4);
        if (lane === prevLane) lane = (lane + 1) % 4; 
        prevLane = lane;
        return Math.max(0, Math.min(3, lane));
    }

    function resize() {
        canvas.width = Math.min(window.innerWidth, 500);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 🎻 [V82 핵심] 리얼 첼로 사운드 엔진 - 웅웅거림 제거, 깊은 우드 톤 극대화
    const eq = new Tone.EQ3({ low: 12, mid: 2, high: -8 }).toDestination(); // 저음 부스팅, 날카로운 고음 컷
    const lowpass = new Tone.Filter(1800, "lowpass").connect(eq); // 바이올린 같은 깽깽거림 원천 차단

    cello = new Tone.Sampler({
        urls: { 
            "C2": "C2.mp3", "D2": "D2.mp3", "E2": "E2.mp3", "F2": "F2.mp3", "G2": "G2.mp3", "A2": "A2.mp3", "B2": "B2.mp3",
            "C3": "C3.mp3", "D3": "D3.mp3", "E3": "E3.mp3", "F3": "F3.mp3", "G3": "G3.mp3", "A3": "A3.mp3", "B3": "B3.mp3",
            "C4": "C4.mp3", "D4": "D4.mp3", "E4": "E4.mp3"
        },
        attack: 0.12, // 첼로 특유의 묵직한 첫 보잉 느낌
        release: 0.6,
        baseUrl: "https://gleitz.github.io/midi-js-soundfonts/MusyngKite/cello-mp3/",
        onload: () => { 
            const btn = document.getElementById('start-btn');
            btn.disabled = false;
            btn.innerText = "리얼 첼로 대공연 입장 ✨"; 
        }
    }).connect(lowpass);

    function spawnTile(yPos) {
        const songNotes = songs[selected].p.split(',');
        const note = songNotes[nextNoteIndex % songNotes.length];
        const lane = getLaneFromNote(note);
        tiles.push({ lane: lane, y: yPos || -canvas.height/4, h: canvas.height/4, note: note, hit: false });
        nextNoteIndex++;
    }

    function updateHearts() {
        const container = document.getElementById('heart-container');
        container.innerHTML = "🩷".repeat(lives);
    }

    function animate() {
        if(!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        laneGlow.forEach((g, i) => {
            if(g > 0) {
                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, `rgba(197, 160, 89, ${g * 0.4})`);
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = grad; ctx.fillRect(i * canvas.width/4, 0, canvas.width/4, canvas.height);
                laneGlow[i] -= 0.05;
            }
        });

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            t.y += speed;
            const x = t.lane * canvas.width/4;
            if(t.hit) {
                ctx.fillStyle = "rgba(197, 160, 89, 0.25)"; ctx.fillRect(x, t.y, canvas.width/4, t.h);
            } else {
                ctx.fillStyle = "#333"; 
                drawRoundedRect(ctx, x + 12, t.y + 12, canvas.width/4 - 24, t.h - 24, 18); // 터치 잘 되게 시각적 보강
            }

            if(t.y > canvas.height) {
                if(!t.hit) { lives--; updateHearts(); if(lives <= 0) endConcert(false); }
                tiles.splice(i, 1);
                spawnTile(tiles.length > 0 ? tiles[tiles.length-1].y - canvas.height/4 : -canvas.height/4);
            }
        }

        let elapsed = (Date.now() - startTime) / 1000;
        let progress = (elapsed / songs[selected].time) * 100;
        document.getElementById('progress-bar').style.width = Math.min(100, progress) + "%";
        if(progress >= 100 && tiles.every(t => t.hit || t.y > canvas.height)) endConcert(true);

        particles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if(p.life <= 0) particles.splice(idx, 1);
            else {
                ctx.fillStyle = `rgba(255, 133, 192, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
            }
        });

        speed += accel;
        if(isPlaying) requestAnimationFrame(animate);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
    }

    canvas.addEventListener('pointerdown', (e) => {
        if(!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const tx = e.clientX - rect.left;
        const ty = e.clientY - rect.top;
        const lane = Math.floor(tx / (canvas.width / 4));

        // 🎻 자석 터치 판정: 판정 범위를 넉넉하게 상향
        let target = tiles.find(t => !t.hit && t.y + t.h > canvas.height * 0.2); 
        
        if(target && target.lane === lane) {
            target.hit = true; score++;
            document.getElementById('score-display').innerText = score;
            laneGlow[lane] = 1.0;
            for(let i=0; i<15; i++) particles.push({ x: tx, y: ty, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0 });
            
            // 🎻 실크 레가토 (0.08초 겹침)
            if (lastNote && lastNote !== target.note) {
                cello.triggerRelease(lastNote, "+0.08"); 
            }
            cello.triggerAttack(target.note, Tone.now(), Math.random()*0.2 + 0.85);
            lastNote = target.note;
        }
    });

    function endConcert(win) {
        isPlaying = false;
        if (lastNote) cello.triggerRelease(lastNote);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function renderSongs() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === selected ? 'active' : ''}`;
            div.innerHTML = `<span>${s.t}</span><span class="lv-badge lv-${s.lv}">${s.lv}</span>`;
            div.onclick = () => { selected = i; renderSongs(); };
            list.appendChild(div);
        });
    }
    renderSongs();

    document.getElementById('start-btn').onclick = async () => {
        await Tone.start();
        isPlaying = true; tiles = []; score = 0; lives = 10; nextNoteIndex = 0; startTime = Date.now(); lastNote = null;
        updateHearts();
        
        const lv = songs[selected].lv;
        if(lv === "하") { speed = 3.0; accel = 0.00003; }
        else if(lv === "중") { speed = 4.0; accel = 0.00008; }
        else { speed = 5.2; accel = 0.00015; }

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        
        // 🎻 시작 직후 타일 배치 안정화
        for(let i=0; i<5; i++) spawnTile(canvas.height - (i + 1) * (canvas.height/4));
        
        animate();
    };
    document.getElementById('retry-btn').onclick = () => location.reload();
</script>
</body>
</html>
